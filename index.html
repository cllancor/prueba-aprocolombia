<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acuerdo Comercial · Gambo Creativo × Aprocolombia</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">

<style>

/* =========================
   VARIABLES
========================= */
:root {
  --bg-base: #0A0D0F;
  --bg-elevated: #181D22;

  --verde-neon: #39FF8C;
  --verde-mid: #1BAD5C;

  --text-primary: #F0F4F0;
  --text-secondary: #9FB3A4;
  --text-muted: #5C7263;

  --font-serif: 'Libre Baskerville', serif;
  --font-sans: 'Source Sans 3', sans-serif;

  --border-mid: rgba(57,255,140,0.2);
}

/* =========================
   BASE
========================= */
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg-base);
  color: var(--text-primary);
  font-family: var(--font-sans);
}

/* =========================
   WRAP (FIX STACKING)
========================= */
.wrap {
  max-width: 900px;
  margin: 0 auto;
  padding: 0 28px 120px;
  position: relative;
  z-index: 1;
}

/* =========================
   DESCARGA BLOCK (FIX REAL)
========================= */
.descarga-block {
  background: var(--bg-elevated);
  border: 1px solid var(--border-mid);
  border-radius: 20px;
  padding: 56px 48px;
  margin-top: 96px;

  position: relative;
  isolation: isolate;
  z-index: 1;

  text-align: center;
  overflow: hidden;
}

/* Glow fondo */
.descarga-block::before,
.descarga-block::after {
  content: '';
  position: absolute;
  inset: 0;
  z-index: 0;
}

.descarga-block::before {
  top: -80px;
  left: 50%;
  transform: translateX(-50%);
  width: 500px;
  height: 400px;
  background: radial-gradient(circle, rgba(57,255,140,0.12), transparent 70%);
}

.descarga-block::after {
  border: 1px solid transparent;
  background: linear-gradient(var(--bg-elevated), var(--bg-elevated)) padding-box,
              linear-gradient(135deg, var(--verde-neon), transparent) border-box;
}

/* contenido encima */
.descarga-block > * {
  position: relative;
  z-index: 2;
}

/* textos */
.descarga-label {
  font-size: 11px;
  letter-spacing: 0.16em;
  color: var(--verde-neon);
}

.descarga-h {
  font-family: var(--font-serif);
  font-size: 32px;
  color: var(--text-primary);
}

.descarga-h span {
  color: var(--text-primary); /* FIX WHITE VAR */
}

.descarga-sub {
  font-size: 14px;
  color: var(--text-secondary);
  margin-top: 12px;
  max-width: 520px;
  margin-left: auto;
  margin-right: auto;
}

/* botón */
.btn-descarga {
  display: inline-flex;
  margin-top: 28px;
  padding: 15px 36px;
  background: var(--verde-neon);
  color: #03120A;
  border-radius: 10px;
  font-weight: 700;
  text-decoration: none;
}

</style>
</head>

<body>

<div class="wrap">

  <!-- CONTENIDO OMITIDO PARA SIMPLICIDAD -->

  <div class="descarga-block">
    <div class="descarga-label">Documento listo para firmar</div>

    <div class="descarga-h">
      Descarga el contrato<br>
      <span>y fírmalo.</span>
    </div>

    <p class="descarga-sub">
      El PDF incluye portada exclusiva, cláusulas completas y firmas.
    </p>

    <a class="btn-descarga" href="#">
      Descargar PDF
    </a>
  </div>

</div>

</body>
</html>
